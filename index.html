<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHANTOM OCR // Black Edition</title>
    <link rel="shortcut icon" href="https://cdn-icons-png.flaticon.com/512/5137/5137239.png" type="image/x-icon">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-base: #020205;
            --bg-card: rgba(10, 11, 20, 0.8);
            --primary-neon: #00f2ff;
            --primary-glow: rgba(0, 242, 255, 0.3);
            --accent-purple: #9d00ff;
            --text-main: #e2e8f0;
            --text-muted: #64748b;
            --border-color: rgba(255, 255, 255, 0.05);
            --easing: cubic-bezier(0.23, 1, 0.32, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: radial-gradient(circle at center, #080a1a 0%, var(--bg-base) 100%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden; /* Prevent horizontal scroll */
            padding: 20px; /* Space for mobile/long cards */
        }

        /* ANIMATED BACKGROUND */
        .bg-visuals {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .aura {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.25;
            mix-blend-mode: screen;
        }

        #aura-1 { width: 800px; height: 800px; background: var(--accent-purple); top: -200px; left: -200px; }
        #aura-2 { width: 600px; height: 600px; background: #0044ff; bottom: -100px; right: -100px; }

        .bg-grid {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(var(--border-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--border-color) 1px, transparent 1px);
            background-size: 60px 60px;
            opacity: 0.4;
            mask-image: radial-gradient(circle at center, black 40%, transparent 100%);
        }

        /* MAIN CONTAINER FIX */
        .main-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .container {
            background-color: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            width: 100%;
            max-width: 500px;
            padding: 40px;
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 40px 100px rgba(0,0,0,0.6);
            position: relative;
            max-height: 90vh; /* Constraints height to screen */
            overflow-y: auto; /* ENABLE INTERNAL SCROLL */
            opacity: 0;
            scrollbar-width: thin;
            scrollbar-color: var(--border-color) transparent;
        }

        /* Custom Scrollbar for the card */
        .container::-webkit-scrollbar { width: 6px; }
        .container::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }

        .container::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary-neon), var(--accent-purple), transparent);
            z-index: 20;
        }

        header { text-align: center; margin-bottom: 30px; }
        h1 { font-size: 1.6rem; font-weight: 900; letter-spacing: -0.05em; text-transform: uppercase; text-shadow: 0 0 20px var(--primary-glow); }
        h1 span { color: var(--accent-purple); }
        .subtitle { color: var(--text-muted); font-size: 0.85rem; margin-top: 5px; }

        /* DROP ZONE */
        .drop-zone {
            border: 1px dashed var(--border-color);
            background-color: rgba(255,255,255,0.02);
            border-radius: 16px;
            padding: 40px 20px;
            cursor: pointer;
            text-align: center;
            transition: all 0.4s var(--easing);
        }
        .drop-zone:hover { border-color: var(--primary-neon); background: rgba(0, 242, 255, 0.03); }

        /* IMAGE PREVIEW FIX */
        .preview-wrapper {
            display: none;
            margin-top: 25px;
            border-top: 1px solid var(--border-color);
            padding-top: 25px;
            text-align: center;
        }
        .preview-wrapper.active { display: block; }

        #preview {
            width: 100%;
            max-height: 350px; /* LIMIT IMAGE HEIGHT */
            object-fit: contain; /* Keep aspect ratio */
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .btn-group { margin-top: 25px; padding-bottom: 5px; }

        button {
            width: 100%; padding: 16px; border-radius: 12px; border: none;
            font-weight: 700; font-size: 0.9rem; text-transform: uppercase;
            cursor: pointer; transition: all 0.3s var(--easing);
            display: flex; height: 55px; align-items: center; justify-content: center; gap: 10px;
        }

        #extractBtn { background: #ffffff; color: #000000; box-shadow: 0 0 20px rgba(255,255,255,0.1); }
        #extractBtn:hover:not(:disabled) { background: var(--primary-neon); box-shadow: 0 0 40px var(--primary-glow); transform: translateY(-2px); }

        /* SIDEBAR (RESULT) */
        .result-container {
            position: fixed; top: 0; right: -450px;
            width: 420px; height: 100vh;
            background: rgba(10, 11, 20, 0.9);
            backdrop-filter: blur(25px);
            border-left: 1px solid var(--border-color);
            padding: 40px; display: flex; flex-direction: column; z-index: 100;
        }

        .result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .result-header span { font-size: 0.75rem; font-weight: 800; color: var(--accent-purple); text-transform: uppercase; }

        pre {
            flex-grow: 1; background: rgba(0,0,0,0.3); color: var(--primary-neon);
            padding: 20px; border-radius: 12px; overflow-y: auto;
            white-space: pre-wrap; font-family: monospace; font-size: 0.85rem; line-height: 1.6;
            border: 1px solid rgba(0, 242, 255, 0.1);
        }

        /* LOADER */
        .loader {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 11, 20, 0.95); z-index: 50;
            justify-content: center; align-items: center; flex-direction: column; gap: 15px;
        }
        .scanning-bar { width: 150px; height: 2px; background: rgba(255,255,255,0.05); position: relative; overflow: hidden; }
        .scanning-bar::after { content: ''; position: absolute; width: 40%; height: 100%; background: var(--primary-neon); box-shadow: 0 0 15px var(--primary-neon); animation: scan 1.5s infinite var(--easing); }
        @keyframes scan { 0% { left: -40%; } 100% { left: 100%; } }
    </style>
</head>
<body>

<div class="bg-visuals">
    <div class="aura" id="aura-1"></div>
    <div class="aura" id="aura-2"></div>
    <div class="bg-grid"></div>
</div>

<div class="main-wrapper">
    <div class="container" id="appCard">
        <div class="loader" id="loader">
            <div class="scanning-bar"></div>
            <p style="font-size: 0.7rem; letter-spacing: 0.2em;">DECODING SOURCE...</p>
        </div>

        <header>
            <h1>Phantom // <span>OCR</span></h1>
            <p class="subtitle">Precision text extraction module</p>
        </header>

        <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
            <i data-lucide="aperture" size="40" style="margin-bottom:10px; color:var(--text-muted)"></i>
            <p id="dropText">Click to Initialize Stream</p>
            <p style="font-size: 0.7rem; color: var(--text-muted); margin-top:5px;">Drag & Drop Image</p>
        </div>

        <input type="file" id="fileInput" accept="image/*" hidden />

        <div class="preview-wrapper" id="previewWrapper">
            <img id="preview" alt="Source" />
        </div>

        <div class="btn-group">
            <button id="extractBtn" onclick="uploadImage()">
                <i data-lucide="brain-circuit" size="18"></i> Run Extraction
            </button>
        </div>
    </div>
</div>

<div class="result-container" id="resultSidebar">
    <div class="result-header">
        <span>Extracted Data</span>
        <button onclick="copyText()" style="width:auto; height:35px; font-size:0.7rem; background:rgba(255,255,255,0.05); color:white; border:1px solid var(--border-color)">Copy</button>
    </div>
    <pre id="result"></pre>
</div>

<script>
    lucide.createIcons();

    // Entrance
    gsap.to("#appCard", { opacity: 1, duration: 1, y: 0, ease: "power4.out" });
    
    // Background Animation
    gsap.to("#aura-1", { x: 300, y: 200, duration: 20, repeat: -1, yoyo: true, ease: "sine.inOut" });
    gsap.to("#aura-2", { x: -200, y: -100, duration: 25, repeat: -1, yoyo: true, ease: "sine.inOut" });

    const fileInput = document.getElementById("fileInput");
    const preview = document.getElementById("preview");
    const previewWrapper = document.getElementById("previewWrapper");
    const resultBox = document.getElementById("result");
    const loader = document.getElementById("loader");
    const sidebar = document.getElementById("resultSidebar");

    fileInput.addEventListener("change", (e) => handleFiles(e.target.files));

    function handleFiles(files) {
        if (files.length > 0) {
            const file = files[0];
            preview.src = URL.createObjectURL(file);
            previewWrapper.classList.add('active');
            document.getElementById("dropText").innerHTML = `Source Ready: <strong>${file.name}</strong>`;
            
            // Auto-scroll to bottom of card so button is visible
            setTimeout(() => {
                const card = document.getElementById("appCard");
                card.scrollTo({ top: card.scrollHeight, behavior: 'smooth' });
            }, 100);
        }
    }

    async function uploadImage() {
        if (!fileInput.files.length) return;

        const formData = new FormData();
        formData.append("file", fileInput.files[0]);

        loader.style.display = "flex";
        gsap.to(sidebar, { right: -450, duration: 0.3 });

        try {
            const response = await fetch("/extract-text/", { method: "POST", body: formData });
            const data = await response.json();
            if (data.success) {
                resultBox.textContent = data.text || "No text detected.";
                gsap.to(sidebar, { right: 0, duration: 0.8, ease: "elastic.out(1, 0.8)" });
            }
        } catch (err) {
            alert("Connection error.");
        } finally {
            loader.style.display = "none";
        }
    }

    function copyText() {
        navigator.clipboard.writeText(resultBox.textContent);
        alert("Copied!");
    }
</script>

</body>
</html>
