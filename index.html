<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHANTOM OCR</title>
    <link rel="shortcut icon" href="https://cdn-icons-png.flaticon.com/512/6348/6348326.png" type="image/x-icon">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-base: #020205;
            --bg-card: rgba(10, 11, 20, 0.85);
            --primary-neon: #00f2ff;
            --primary-glow: rgba(0, 242, 255, 0.3);
            --accent-purple: #9d00ff;
            --text-main: #e2e8f0;
            --text-muted: #64748b;
            --border-color: rgba(255, 255, 255, 0.08);
            --easing: cubic-bezier(0.23, 1, 0.32, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: radial-gradient(circle at center, #080a1a 0%, var(--bg-base) 100%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            padding: 15px; /* Reduced for mobile edge clearance */
        }

        /* ANIMATED BACKGROUND */
        .bg-visuals {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .aura {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px); /* Slightly reduced blur for performance */
            opacity: 0.25;
            mix-blend-mode: screen;
        }

        #aura-1 { width: 60vw; height: 60vw; background: var(--accent-purple); top: -10%; left: -10%; }
        #aura-2 { width: 50vw; height: 50vw; background: #0044ff; bottom: -10%; right: -10%; }

        .bg-grid {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(var(--border-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--border-color) 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.4;
            mask-image: radial-gradient(circle at center, black 40%, transparent 100%);
        }

        /* MAIN CONTAINER */
        .main-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 520px; /* Max width for desktop */
            display: flex;
            justify-content: center;
        }

        .container {
            background-color: var(--bg-card);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            width: 100%;
            padding: clamp(25px, 5vw, 45px); /* Fluid padding */
            border-radius: 24px;
            border: 1px solid var(--border-color);
            box-shadow: 0 40px 100px rgba(0,0,0,0.7);
            position: relative;
            max-height: 85vh;
            overflow-y: auto;
            opacity: 0;
            scrollbar-width: thin;
            scrollbar-color: var(--border-color) transparent;
        }

        .container::-webkit-scrollbar { width: 4px; }
        .container::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }

        .container::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary-neon), var(--accent-purple), transparent);
            z-index: 20;
        }

        header { text-align: center; margin-bottom: 30px; }
        h1 { font-size: clamp(1.3rem, 4vw, 1.7rem); font-weight: 900; letter-spacing: -0.05em; text-transform: uppercase; text-shadow: 0 0 20px var(--primary-glow); }
        h1 span { color: var(--accent-purple); }
        .subtitle { color: var(--text-muted); font-size: clamp(0.75rem, 2vw, 0.85rem); margin-top: 5px; opacity: 0.8; }

        /* DROP ZONE */
        .drop-zone {
            border: 1px dashed var(--border-color);
            background-color: rgba(255,255,255,0.02);
            border-radius: 16px;
            padding: clamp(30px, 8vh, 50px) 15px;
            cursor: pointer;
            text-align: center;
            transition: all 0.4s var(--easing);
        }
        .drop-zone:hover { border-color: var(--primary-neon); background: rgba(0, 242, 255, 0.04); }

        /* PREVIEW */
        .preview-wrapper {
            display: none;
            margin-top: 25px;
            border-top: 1px solid var(--border-color);
            padding-top: 25px;
        }
        .preview-wrapper.active { display: block; }

        #preview {
            width: 100%;
            max-height: 300px;
            object-fit: contain;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .btn-group { margin-top: 25px; }

        button {
            width: 100%; padding: 14px; border-radius: 12px; border: none;
            font-weight: 700; font-size: 0.9rem; text-transform: uppercase;
            cursor: pointer; transition: all 0.3s var(--easing);
            display: flex; height: 50px; align-items: center; justify-content: center; gap: 10px;
        }

        #extractBtn { background: #ffffff; color: #000000; }
        #extractBtn:hover:not(:disabled) { 
            background: var(--primary-neon); 
            box-shadow: 0 0 30px var(--primary-glow); 
            transform: translateY(-2px); 
        }

        /* SIDEBAR / RESULT - Responsive Overlay */
        .result-container {
            position: fixed; 
            top: 0; 
            right: -100%; /* Hidden off-screen */
            width: 100%; 
            max-width: 440px; 
            height: 100vh;
            background: rgba(10, 11, 20, 0.98);
            backdrop-filter: blur(30px);
            border-left: 1px solid var(--border-color);
            padding: clamp(20px, 5vw, 40px); 
            display: flex; 
            flex-direction: column; 
            z-index: 100;
            box-shadow: -20px 0 60px rgba(0,0,0,0.5);
            transition: transform 0.5s var(--easing);
        }

        /* Mobile specific adjustments */
        @media (max-width: 480px) {
            .result-container {
                max-width: 100%;
                border-left: none;
            }
            .container {
                max-height: 90vh;
            }
        }

        .result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .result-header span { font-size: 0.7rem; font-weight: 800; color: var(--accent-purple); text-transform: uppercase; letter-spacing: 0.1em; }

        .copy-btn {
            width: auto; height: 34px; padding: 0 15px;
            background: rgba(255,255,255,0.05); color: white;
            border: 1px solid var(--border-color);
            font-size: 0.7rem; text-transform: none;
        }

        pre {
            flex-grow: 1; background: rgba(0,0,0,0.4); color: var(--primary-neon);
            padding: 20px; border-radius: 12px; overflow-y: auto;
            white-space: pre-wrap; font-family: 'Fira Code', monospace; 
            font-size: 0.8rem; line-height: 1.6;
            border: 1px solid rgba(0, 242, 255, 0.1);
        }

        /* LOADER */
        .loader {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 11, 20, 0.98); z-index: 50;
            justify-content: center; align-items: center; flex-direction: column; gap: 20px;
        }
        .scanning-bar { width: 140px; height: 2px; background: rgba(255,255,255,0.05); position: relative; overflow: hidden; }
        .scanning-bar::after { content: ''; position: absolute; width: 40%; height: 100%; background: var(--primary-neon); box-shadow: 0 0 15px var(--primary-neon); animation: scan 1.5s infinite var(--easing); }
        @keyframes scan { 0% { left: -40%; } 100% { left: 100%; } }
    </style>
</head>
<body>

<div class="bg-visuals">
    <div class="aura" id="aura-1"></div>
    <div class="aura" id="aura-2"></div>
    <div class="bg-grid"></div>
</div>

<div class="main-wrapper">
    <div class="container" id="appCard">
        <div class="loader" id="loader">
            <div class="scanning-bar"></div>
            <p style="font-size: 0.6rem; letter-spacing: 0.3em; color: var(--primary-neon);">DECODING...</p>
        </div>

        <header>
            <h1>Phantom // <span>OCR</span></h1>
            <p class="subtitle">Neural text extraction interface</p>
        </header>

        <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
            <i data-lucide="aperture" size="36" style="margin-bottom:10px; color:var(--text-muted)"></i>
            <p id="dropText" style="font-size: 0.9rem;">Initialize Source</p>
            <p style="font-size: 0.65rem; color: var(--text-muted); margin-top:5px;">TAP OR DRAG FILE</p>
        </div>

        <input type="file" id="fileInput" accept="image/*" hidden />

        <div class="preview-wrapper" id="previewWrapper">
            <img id="preview" alt="Source" />
        </div>

        <div class="btn-group">
            <button id="extractBtn" onclick="uploadImage()">
                <i data-lucide="brain-circuit" size="18"></i> Run Extraction
            </button>
        </div>
    </div>
</div>

<div class="result-container" id="resultSidebar">
    <div class="result-header">
        <span>Extracted Data</span>
        <div style="display: flex; gap: 10px;">
            <button id="copyBtn" class="copy-btn" onclick="copyText()">
                <i data-lucide="copy" size="14" style="margin-right:5px;"></i>Copy
            </button>
            <button class="copy-btn" onclick="closeSidebar()" style="padding: 0 10px;">
                <i data-lucide="x" size="14"></i>
            </button>
        </div>
    </div>
    <pre id="result"></pre>
</div>

<script>
    lucide.createIcons();

    // GSAP Entrance
    gsap.to("#appCard", { opacity: 1, duration: 1.2, y: 0, ease: "power4.out" });
    
    // Background Glow Loops
    gsap.to("#aura-1", { x: '10vw', y: '5vh', duration: 15, repeat: -1, yoyo: true, ease: "sine.inOut" });
    gsap.to("#aura-2", { x: '-10vw', y: '-5vh', duration: 20, repeat: -1, yoyo: true, ease: "sine.inOut" });

    const fileInput = document.getElementById("fileInput");
    const preview = document.getElementById("preview");
    const previewWrapper = document.getElementById("previewWrapper");
    const resultBox = document.getElementById("result");
    const loader = document.getElementById("loader");
    const sidebar = document.getElementById("resultSidebar");
    const copyBtn = document.getElementById("copyBtn");

    fileInput.addEventListener("change", (e) => handleFiles(e.target.files));

    function handleFiles(files) {
        if (files.length > 0) {
            const file = files[0];
            preview.src = URL.createObjectURL(file);
            previewWrapper.classList.add('active');
            document.getElementById("dropText").innerHTML = `Ready: <strong>${file.name}</strong>`;
            
            setTimeout(() => {
                const card = document.getElementById("appCard");
                card.scrollTo({ top: card.scrollHeight, behavior: 'smooth' });
            }, 150);
        }
    }

    function closeSidebar() {
        gsap.to(sidebar, { right: "-100%", duration: 0.5, ease: "power2.in" });
    }

    async function uploadImage() {
        if (!fileInput.files.length) return;

        const formData = new FormData();
        formData.append("file", fileInput.files[0]);

        loader.style.display = "flex";
        closeSidebar();

        try {
            const response = await fetch("/extract-text/", { method: "POST", body: formData });
            const data = await response.json();
            if (data.success) {
                resultBox.textContent = data.text || "// NO TEXT DETECTED";
                gsap.to(sidebar, { right: 0, duration: 0.8, ease: "elastic.out(1, 0.8)" });
            }
        } catch (err) {
            resultBox.textContent = "// CONNECTION ERROR";
            gsap.to(sidebar, { right: 0, duration: 0.8 });
        } finally {
            loader.style.display = "none";
        }
    }

    function copyText() {
        const text = resultBox.textContent;
        navigator.clipboard.writeText(text).then(() => {
            const originalContent = copyBtn.innerHTML;
            copyBtn.innerHTML = '<i data-lucide="check" size="14" style="margin-right:5px;"></i>Copied';
            copyBtn.style.color = "var(--primary-neon)";
            copyBtn.style.borderColor = "var(--primary-neon)";
            lucide.createIcons();
            
            gsap.to(copyBtn, { scale: 1.05, duration: 0.1, yoyo: true, repeat: 1 });

            setTimeout(() => {
                copyBtn.innerHTML = originalContent;
                copyBtn.style.color = "white";
                copyBtn.style.borderColor = "var(--border-color)";
                lucide.createIcons();
            }, 2000);
        });
    }
</script>

</body>
</html>
